name: frontend
description: "PhysiLearn Frontend - Health and Fitness Monitoring"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  fl_chart: ^0.66.0
  provider: ^6.1.1
  intl: ^0.19.0
  go_router: ^17.1.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  flutter_secure_storage: ^10.0.0
  web: ^1.1.1
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  printing: ^5.11.0
  pdf: ^3.10.4
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - logo.svg